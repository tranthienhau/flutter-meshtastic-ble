name: flutter_meshtastic_ble
description: "Flutter POC: BLE bridge to Meshtastic LoRa devices for long-range (200m+) participant ID broadcast over mesh."
publish_to: 'none'
version: 0.1.0

environment:
  sdk: ^3.5.0

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.5.1
  flutter_reactive_ble: ^5.3.1
  permission_handler: ^11.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
